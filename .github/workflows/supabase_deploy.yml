name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - ".github/workflows/supabase_deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Revert phantom remote-only migrations
        # 20260504000001 exists in supabase_migrations.schema_migrations on the
        # remote DB but has NO corresponding local .sql file (created as a
        # side-effect of apply_migration MCP using a timestamp different from
        # the filename). supabase db push refuses to run while any remote version
        # lacks a local file. Marking it as reverted removes the blocker.
        # Add new phantom versions here if supabase db push reports them again.
        #
        # Note: do NOT revert 20260526200000 here. That slot collides between two
        # logical migrations (the MCP-auto timestamp for alerts_module_visibility,
        # now re-registered as 20260525280000, AND the real local file
        # 20260526200000_data_sources_freshness.sql). The data_sources_freshness
        # version is now correctly registered as applied (its content was already
        # superseded in production by 20260527300000_data_sources_freshness_subsidy_fix,
        # which dropped the obsolete anp_subsidy_history reference). Reverting
        # would force db push to re-apply the broken local SQL and crash with
        # "relation public.anp_subsidy_history does not exist".
        run: |
          supabase migration repair 20260504000001 --status reverted || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Mark all pre-existing migrations as applied
        # All migrations applied before this workflow was fixed (via MCP or SQL
        # Editor). Marking them as applied ensures db push only processes truly
        # new migrations. List covers baseline through 20260512000002 inclusive.
        run: |
          for v in \
            20260327174919 \
            20260328200000 \
            20260329000000 \
            20260331000000 \
            20260331000001 \
            20260401000000 \
            20260401000001 \
            20260402000000 \
            20260415000000 \
            20260415000001 \
            20260415000002 \
            20260415000003 \
            20260415000004 \
            20260416000000 \
            20260416000001 \
            20260422000000 \
            20260422000001 \
            20260423000000 \
            20260423000001 \
            20260423000002 \
            20260424000000 \
            20260424000001 \
            20260424000002 \
            20260424000003 \
            20260424000004 \
            20260424000005 \
            20260424000006 \
            20260424000007 \
            20260424000008 \
            20260424000009 \
            20260504000002 \
            20260504000003 \
            20260504000004 \
            20260504000005 \
            20260504000006 \
            20260504000007 \
            20260504000008 \
            20260504000009 \
            20260504000010 \
            20260504000011 \
            20260504000012 \
            20260504000013 \
            20260505000000 \
            20260505000001 \
            20260505000002 \
            20260505000003 \
            20260505000004 \
            20260505000005 \
            20260505000006 \
            20260505000007 \
            20260505000008 \
            20260505000009 \
            20260506000001 \
            20260507000001 \
            20260507000002 \
            20260507000003 \
            20260507000004 \
            20260507000005 \
            20260507000006 \
            20260507000010 \
            20260507000011 \
            20260507000012 \
            20260507202001 \
            20260508000001 \
            20260508000002 \
            20260508000003 \
            20260508000004 \
            20260508000005 \
            20260508000006 \
            20260508000007 \
            20260508000008 \
            20260508000009 \
            20260508000010 \
            20260508000011 \
            20260508000012 \
            20260508000013 \
            20260508000014 \
            20260508000015 \
            20260508120001 \
            20260508130001 \
            20260512000000 \
            20260512000001 \
            20260512000002 \
            20260513000001 \
            20260513000002 \
            20260513120000 \
            20260525280000 \
            20260526200000 \
            20260527100000 \
            20260527400000 \
            20260528960000 \
            20260601000000; do
            supabase migration repair "$v" --status applied || true
          done
        # 20260525280000 (alerts_module_visibility): migration body was applied
        # via MCP apply_migration but the schema_migrations row originally
        # carried the MCP-auto timestamp 20260526200000 instead of the filename
        # timestamp; later reconciled (commit e6817e08) so the row now lives at
        # the correct version.
        #
        # 20260526200000 (data_sources_freshness): the local .sql file references
        # public.anp_subsidy_history, which was DROPPED by 20260527200000_subsidy_reform.
        # The RPC in production was already replaced by 20260527300000_data_sources_freshness_subsidy_fix
        # (anp_subsidy_history branch removed; caps + commercialization branches added).
        # Marking 20260526200000 as applied here so db push --include-all never
        # tries to re-execute the broken DDL (which would crash with
        # "relation public.anp_subsidy_history does not exist").
        #
        # 20260527100000 (nd_volume_mensal_historico) and 20260527400000
        # (nd_volume_mensal_historico_fix_ambiguous): both were applied via MCP
        # apply_migration in the same session that diagnosed this deploy chain
        # outage. The original CREATE FUNCTION succeeded but the body raised
        # 42702 "column reference anchor_month is ambiguous" at first call
        # (three LEFT JOINs in the `combined` CTE all expose anchor_month).
        # The 20260527400000 fix re-CREATEs the function with `ma.month AS
        # month` to remove the ambiguity. Marking both as applied here in case
        # the schema_migrations rows ever get scrubbed.
        #
        # 20260528960000 (imports_exports_unit_price_with_volume): replaces
        # get_imports_exports_fob_price_serie with get_imports_exports_imports_unit_price
        # and _exports_unit_price (both include vol_m3 numeric). Applied via MCP
        # apply_migration which registered it as 20260601000000 in schema_migrations.
        # The 20260601000000 slot is NO LONGER PHANTOM — it now corresponds to the
        # real local file 20260601000000_field_canonical_expansion_cache.sql merged
        # in f6fdb976 (canonical expansion cache, /well-by-well perf fix). The
        # earlier `migration repair 20260601000000 --status reverted` step was
        # removed accordingly: keeping it would cause db push --include-all to
        # re-apply the file on every push (idempotent DDL, but wasteful + drops
        # and recreates the 4 CDP RPCs every time — Pegadinha #22 of CLAUDE.md).
        # Marking 20260601000000 as applied here keeps the schema_migrations row
        # stable even if it ever gets scrubbed.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to Supabase
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Post-migration smoke test
        # Verifies that every critical table, RLS policy, and RPC function
        # declared in migrations actually exists in the remote database.
        # Fails the workflow immediately on the first missing object,
        # preventing silent failures like the 20260402000000_sales_volumes bug
        # where get_sv_* functions were never created but the migration was
        # registered as applied.
        # Note: supabase db execute was removed from CLI; use db query instead.
        # Note: --linked is required — without it the CLI tries 127.0.0.1:54322
        # (the local dev Postgres) which does not exist on the GHA runner.
        # The project is already linked by the "Link Supabase project" step above.
        run: supabase db query --linked --file supabase/tests/migration_smoke.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
