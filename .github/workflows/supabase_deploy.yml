name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase_deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair remote-only (phantom) migrations
        # Some migrations were applied directly via MCP/Dashboard and exist in
        # supabase_migrations.schema_migrations with no corresponding local .sql
        # file. supabase db push refuses to proceed when it finds such versions.
        # This step detects them dynamically and marks them as reverted so that
        # db push can continue. The pattern is: output lines where the remote
        # column has a version but the local column is blank/missing.
        run: |
          supabase migration list 2>&1 | tee /tmp/migration_list.txt || true
          cat /tmp/migration_list.txt
          # Extract versions that are remote-only (present in DB but no local file)
          # supabase migration list columns: LOCAL | REMOTE | TIME
          # Remote-only rows have an empty LOCAL column: "       | 20260504000001 | ..."
          grep -E '^\s*\|\s*[0-9]{14}\s*\|' /tmp/migration_list.txt | \
            awk -F'|' '{ gsub(/ /,"",$2); gsub(/ /,"",$3); if ($2=="" && $3!="") print $3 }' | \
            while read version; do
              echo "Repairing remote-only phantom migration: $version"
              supabase migration repair "$version" --status reverted || true
            done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Mark all pre-existing migrations as applied
        # All migrations applied before this workflow was fixed (via MCP or SQL
        # Editor). Marking them as applied ensures db push only processes truly
        # new migrations. List covers baseline through 20260507000002 inclusive.
        run: |
          for v in \
            20260327174919 \
            20260328200000 \
            20260329000000 \
            20260331000000 \
            20260331000001 \
            20260401000000 \
            20260401000001 \
            20260402000000 \
            20260415000000 \
            20260415000001 \
            20260415000002 \
            20260415000003 \
            20260415000004 \
            20260416000000 \
            20260416000001 \
            20260422000000 \
            20260422000001 \
            20260423000000 \
            20260423000001 \
            20260423000002 \
            20260424000000 \
            20260424000001 \
            20260424000002 \
            20260424000003 \
            20260424000004 \
            20260424000005 \
            20260424000006 \
            20260424000007 \
            20260424000008 \
            20260424000009 \
            20260504000002 \
            20260504000003 \
            20260504000004 \
            20260504000005 \
            20260504000006 \
            20260504000007 \
            20260504000008 \
            20260504000009 \
            20260504000010 \
            20260504000011 \
            20260504000012 \
            20260504000013 \
            20260505000000 \
            20260505000001 \
            20260505000002 \
            20260505000003 \
            20260505000004 \
            20260505000005 \
            20260505000006 \
            20260505000007 \
            20260505000008 \
            20260505000009 \
            20260506000001 \
            20260507000001 \
            20260507000002; do
            supabase migration repair "$v" --status applied || true
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to Supabase
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Post-migration smoke test
        # Verifies that every critical table, RLS policy, and RPC function
        # declared in migrations actually exists in the remote database.
        # Fails the workflow immediately on the first missing object,
        # preventing silent failures like the 20260402000000_sales_volumes bug
        # where get_sv_* functions were never created but the migration was
        # registered as applied.
        run: supabase db execute --file supabase/tests/migration_smoke.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
