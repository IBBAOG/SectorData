name: Alertas Monitor

on:
  # Disparado externamente via cron-job.org → workflow_dispatch a cada 2h.
  # O schedule nativo do GitHub não garante pontualidade em intervalos curtos;
  # usamos o mesmo padrão dos workflows anp_vendas_watch.yml e navios_lineup_scrape.yml.
  workflow_dispatch:
    inputs:
      base:
        description: 'Slug específico a verificar (vazio = todas as 11 bases)'
        required: false
        default: ''

jobs:
  monitor:
    name: Verificar bases e enviar alertas
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ALERTAS_DEST_EMAIL: ${{ secrets.ALERTAS_DEST_EMAIL }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: alertas/requirements.txt

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r alertas/requirements.txt

      - name: Verificar secrets obrigatórios
        run: |
          ok=true
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Secret SUPABASE_URL não configurado"
            ok=false
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "::error::Secret SUPABASE_SERVICE_KEY não configurado"
            ok=false
          fi
          if [ -z "${{ secrets.GMAIL_CREDENTIALS_JSON }}" ]; then
            echo "::error::Secret GMAIL_CREDENTIALS_JSON não configurado"
            ok=false
          fi
          if [ -z "${{ secrets.GMAIL_TOKEN_JSON }}" ]; then
            echo "::error::Secret GMAIL_TOKEN_JSON não configurado"
            ok=false
          fi
          if [ "$ok" = "false" ]; then exit 1; fi
          echo "Secrets OK."

      - name: Reconstruir credenciais Gmail a partir de secrets
        run: |
          # Secrets contêm o conteúdo JSON completo dos arquivos OAuth do Gmail.
          # Eles são escritos em disco para que notificador.py os encontre no path esperado.
          # NUNCA commitar credentials.json ou token.json — estão no .gitignore.
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > alertas/credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > alertas/token.json

      - name: Rodar monitor
        run: |
          if [ -n "${{ inputs.base }}" ]; then
            python alertas/monitor.py --base "${{ inputs.base }}"
          else
            python alertas/monitor.py
          fi
