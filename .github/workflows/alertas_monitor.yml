name: Alertas Monitor

on:
  # Disparado externamente via cron-job.org → workflow_dispatch a cada 2h.
  # O schedule nativo do GitHub não garante pontualidade em intervalos curtos;
  # usamos o mesmo padrão dos workflows anp_vendas_watch.yml e navios_lineup_scrape.yml.
  workflow_dispatch:
    inputs:
      base:
        description: 'Slug específico a verificar (vazio = todas as 11 bases)'
        required: false
        default: ''

jobs:
  monitor:
    name: Verificar bases e enviar alertas
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ALERTAS_DEST_EMAIL: ${{ secrets.ALERTAS_DEST_EMAIL }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      WORKFLOW_DISPATCH_PAT: ${{ secrets.WORKFLOW_DISPATCH_PAT }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: alertas/requirements.txt

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r alertas/requirements.txt

      - name: Verificar secrets obrigatórios
        run: |
          ok=true
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Secret SUPABASE_URL não configurado"
            ok=false
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "::error::Secret SUPABASE_SERVICE_KEY não configurado"
            ok=false
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::error::Secret GMAIL_APP_PASSWORD não configurado"
            ok=false
          fi
          if [ -z "$WORKFLOW_DISPATCH_PAT" ]; then
            echo "::warning::Secret WORKFLOW_DISPATCH_PAT não configurado — anp_cdp_producao_poco não conseguirá redisparar etl_anp_cdp.yml automaticamente quando a sessão expirar."
          fi
          if [ "$ok" = "false" ]; then exit 1; fi
          echo "Secrets OK."

      - name: Rodar monitor
        run: |
          if [ -n "${{ inputs.base }}" ]; then
            python alertas/monitor.py --base "${{ inputs.base }}"
          else
            python alertas/monitor.py
          fi
