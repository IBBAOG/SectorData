name: ETL ANP CDP Diaria (Power BI)

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Forcar run mesmo se ja rodou hoje"
        required: false
        default: "true"
        type: boolean
  schedule:
    # 7h, 12h, 17h BRT (UTC-3) = 10h, 15h, 20h UTC. Sem DST no Brasil desde 2019.
    - cron: "0 10,15,20 * * *"

concurrency:
  group: etl-anp-cdp-diaria
  cancel-in-progress: false

jobs:
  extract-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install requests supabase python-dotenv

      - name: Extract + upload (3 levels)
        run: python scripts/extractors/anp_cdp_powerbi.py --level all --upload

      # Client Alerts hook — these 3 bases are 'digest' cadence, so this only
      # records new-period events; the daily digest workflow delivers them.
      - name: Client Alerts — record events (daily production)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source anp_cdp_diaria --source anp_cdp_diaria_instalacao --source anp_cdp_diaria_poco
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_TOKEN_JSON:       ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
