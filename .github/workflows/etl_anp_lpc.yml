name: ANP LPC — Sync (preços semanais de combustíveis)

on:
  schedule:
    # Daily 14:30 UTC (11:30 BRT). ANP publishes the weekly "Levantamento de
    # Preços" survey on an UNSTABLE weekday (historically Wed, but e.g. Tue
    # 2026-06-09). A Wed-only cron silently lagged anp_lpc by up to a week and
    # missed publish-day refreshes. The scrape is cheap and the upsert is
    # idempotent (ON CONFLICT data_fim,produto,estado) + incremental (downloads
    # only weeks newer than MAX(data_fim)), so a daily run is a clean no-op when
    # nothing new was published and ingests the new week within ~24h on whatever
    # weekday ANP drops it. This is the upstream half of the dg-margins fix
    # (incident 2026-06-09): etl_dg_margins now runs downstream of this via
    # workflow_run, so the freshest pump price always feeds the margins recompute.
    - cron: '30 14 * * *'   # daily 14:30 UTC (11:30 BRT)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ANP LPC → Supabase
        run: python scripts/pipelines/anp/lpc_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (anp_lpc)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source anp_lpc
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}
