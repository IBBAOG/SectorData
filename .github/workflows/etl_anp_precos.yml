name: ANP Preços — Sync (Produtores + GLP)

on:
  schedule:
    - cron: '0 12 * * 1'   # weekly Monday at 12:00 UTC (09:00 BRT)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run both syncs independently — they share zero data.
      - name: Sync ANP Preços Produtores → Supabase
        id: produtores
        if: always()
        run: python scripts/pipelines/anp/precos/02_precos_produtores_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync ANP GLP → Supabase
        id: glp
        if: always()
        run: python scripts/pipelines/anp/glp_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — emit + (immediate) deliver for both bases this ETL updates.
      # Gated per source step so a failure in one sync still alerts the other.
      - name: Client Alerts — notify subscribers (anp_precos_produtores)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: steps.produtores.conclusion == 'success'
        run: python -m scripts.client_alerts.run_base --source anp_precos_produtores
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <onboarding@resend.dev>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}

      - name: Client Alerts — notify subscribers (anp_glp)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: steps.glp.conclusion == 'success'
        run: python -m scripts.client_alerts.run_base --source anp_glp
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <onboarding@resend.dev>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
