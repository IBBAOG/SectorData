name: ANP Preços — Sync (PPI + Produtores + GLP)

on:
  schedule:
    - cron: '0 12 * * 1'   # weekly Monday at 12:00 UTC (09:00 BRT)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run all three syncs independently. We never want a failure in one
      # ANP source to block the others — they share zero data.
      - name: Sync ANP PPI → Supabase
        id: ppi
        if: always()
        run: python scripts/pipelines/anp/precos/01_ppi_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync ANP Preços Produtores → Supabase
        id: produtores
        if: always()
        run: python scripts/pipelines/anp/precos/02_precos_produtores_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync ANP GLP → Supabase
        id: glp
        if: always()
        run: python scripts/pipelines/anp/glp_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
