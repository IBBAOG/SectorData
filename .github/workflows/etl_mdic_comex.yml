name: MDIC Comex — Sync

on:
  schedule:
    - cron: '0 14 * * *'   # daily at 14:00 UTC (11:00 BRT)
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      desde:
        description: 'Mês inicial YYYY-MM (opcional, default: últimos 3 meses)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync MDIC Comex → Supabase
        run: |
          if [ -n "${{ github.event.inputs.desde }}" ]; then
            python scripts/pipelines/mdic_comex_sync.py --desde "${{ github.event.inputs.desde }}"
          else
            python scripts/pipelines/mdic_comex_sync.py --meses 3
          fi
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (mdic_comex)
        if: success()
        run: python -m scripts.client_alerts.run_base --source mdic_comex
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <onboarding@resend.dev>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
