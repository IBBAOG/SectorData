name: Alerts Fast Dispatch (confirmation + queued outbox)

# Runs every 10 minutes — catches recently-created confirmation events and any
# queued outbox that the slower alerts_monitor.yml (cron 2h) hasn't picked up.
# Skips detection entirely (no scraping); only does fanout + deliver.

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

# Prevent overlapping runs — if one is still running when next tick fires, skip it.
# cancel-in-progress: false means the new run is skipped (queued), not the running one cancelled.
# Idempotency anchors (UNIQUE constraints on alert_events + alert_outbox) protect against
# double-send if two runs were to overlap.
concurrency:
  group: alerts-fast-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    name: Fanout + Deliver (fast path)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fanout to outbox (confirmation routing + active subscribers)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.alerts.cli fanout

      - name: Send via Resend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERTS_FRONTEND_URL: ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}
        run: python -m scripts.alerts.cli deliver --batch-limit 50
