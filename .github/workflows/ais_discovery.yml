name: AIS Diesel Import Radar

on:
  schedule:
    # 6× daily, every 4h — covers sparse open-ocean coverage gaps. Each run
    # is 10 min; total ≈ 60 min/day of listening.
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AIS discovery
        run: python ais_discovery.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
