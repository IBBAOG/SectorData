name: Refresh Well-by-Well Materialized Views

# Refreshes mv_production_monthly, mv_production_installation_monthly and
# mv_brazil_monthly via public.refresh_mv_production().
#
# Background: refresh_mv_production() does REFRESH MATERIALIZED VIEW CONCURRENTLY
# on three MVs including mv_production_monthly (~2M-row JOIN). Refresh takes ~10
# minutes. All previous attempts to call it via PostgREST (supabase-py
# client.rpc(...) inside ETL or AFTER STATEMENT trigger on field_stakes) failed
# with HTTP 57014 (gateway timeout @ 60-120s).
#
# The CLI path (supabase db query) uses a direct Postgres connection and is the
# only call site that historically completes successfully. This workflow isolates
# the refresh so it never blocks an ETL job or admin UI write.

on:
  workflow_dispatch: {}
  schedule:
    # Safety-net fallback every 30 minutes. Refresh itself takes ~10 minutes,
    # so the concurrency lock below ensures we never overlap.
    - cron: '*/30 * * * *'

# Single in-flight only. If a refresh is still running when the next cron tick
# arrives, the new run is skipped (cancel-in-progress=false preserves the running
# refresh rather than killing it mid-MV).
concurrency:
  group: refresh-mv-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Prepare refresh SQL
        run: |
          mkdir -p .tmp
          cat > .tmp/refresh_mv_production.sql <<'SQL'
          SET statement_timeout = 0;
          SELECT public.refresh_mv_production();
          SQL

      - name: Refresh production MVs
        run: |
          echo "MV refresh dispatched at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          START=$(date +%s)
          supabase db query --linked --file .tmp/refresh_mv_production.sql
          ELAPSED=$(( $(date +%s) - START ))
          echo "MV refresh completed in ${ELAPSED}s"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
