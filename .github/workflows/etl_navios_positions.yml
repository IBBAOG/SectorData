name: Vessel Position Sync (VesselFinder)

on:
  workflow_run:
    workflows: ["Vessel IMO Lookup"]
    types: [completed]
  schedule:
    # 10 minutes after vessel_lookup cron → IMO/MMSI should be populated
    - cron: '10 10,16,22,4 * * *'
  workflow_dispatch:

jobs:
  sync:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync vessel positions from VesselFinder
        run: python scripts/pipelines/navios/05_positions_sync.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — these bases are 'digest' cadence, so this only
      # records new-period events; the daily digest workflow delivers them.
      - name: Client Alerts — record events (vessel_positions + port_arrivals)
        if: success()
        run: python -m scripts.client_alerts.run_base --source vessel_positions --source port_arrivals
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <onboarding@resend.dev>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
