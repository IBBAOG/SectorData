name: Monitoramento Navios Diesel

on:
  # Agendamento gerenciado externamente via cron-job.org → workflow_dispatch
  # O trigger schedule nativo do GitHub não garante pontualidade em intervalos curtos.
  # Cadência desejada: a cada 6h (10, 16, 22, 04 UTC = 07, 13, 19, 01 BRT).
  workflow_dispatch:           # permite rodar manualmente pelo GitHub e via cron-job.org

jobs:
  monitorar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitoramento
        id: scrape
        run: python scripts/pipelines/navios/01_lineup_scrape.py
        env:
          # Optional residential proxy / scraping gateway for ports behind WAF
          # (e.g. Porto de Itaqui blocks Azure/AWS IPs). Supported formats:
          #   - Standard HTTP proxy:  http://user:pass@host:port
          #   - Gateway URL ending in =:  http://api.scraperapi.com?api_key=K&url=
          # If unset, the script falls back to direct requests → Selenium only.
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}

      - name: Upload debug artifacts (HTML dumps from failed scrapes)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itaqui-debug-html-${{ github.run_id }}
          path: scripts/pipelines/navios/output/debug/
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/setup-node@v4
        if: success() || steps.scrape.conclusion == 'failure'
        with:
          node-version: '22'

      # Always attempt to import — even if the watchdog failed for one port,
      # the other ports' data is in the CSV and should be persisted to Supabase.
      # The job will still fail overall (set in final step).
      - name: Importar dados para Supabase
        id: import
        if: success() || steps.scrape.conclusion == 'failure'
        run: |
          npm install @supabase/supabase-js
          node scripts/pipelines/navios/02_diesel_import.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — gated on the IMPORT step (not the job), because the
      # final watchdog step below intentionally exits 1 when a port scrape failed.
      # 'navios_diesel' is 'digest' cadence, so this only records new-period events.
      - name: Client Alerts — record events (navios_diesel)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: steps.import.conclusion == 'success'
        run: python -m scripts.client_alerts.run_base --source navios_diesel
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}

      - name: Propagar falha do watchdog
        if: steps.scrape.conclusion == 'failure'
        run: |
          echo "::error::Scraper retornou exit != 0 — pelo menos um porto monitorado falhou. Veja artifact 'itaqui-debug-html-${{ github.run_id }}' para HTML dumps."
          exit 1
