name: Extração ANP - Produção por Poço

on:
  schedule:
    - cron: '0 8 5 * *'  # dia 5 de cada mês, 08:00 UTC (05:00 BRT)
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período único MM/YYYY (ex: 01/2025)'
        required: false
      periodo_de:
        description: 'Período inicial MM/YYYY para lote'
        required: false
      periodo_ate:
        description: 'Período final MM/YYYY para lote'
        required: false
      ambiente:
        description: 'Ambiente: M (Mar), S (Pre-Sal), T (Terra), todos'
        required: false
        default: 'todos'

# Sessão APEX capturada manualmente e armazenada em alertas_session (base='anp_cdp').
# CI usa apenas replay (01_extract_replay_only.py) — zero Selenium, zero CAPTCHA.
# Quando a sessão expirar (meses), re-capture localmente com 01_extract.py --capture
# e atualize alertas_session via SQL (ver docs/etl-pipelines/PRD.md).

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Calcular período automático
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            ARGS="--periodo ${{ github.event.inputs.periodo }}"
          elif [ -n "${{ github.event.inputs.periodo_de }}" ]; then
            DE="${{ github.event.inputs.periodo_de }}"
            ATE="${{ github.event.inputs.periodo_ate || github.event.inputs.periodo_de }}"
            ARGS="--de $DE --ate $ATE"
          else
            # Agendado: 2 meses atrás (calculado pelo script quando nenhum argumento é passado)
            ARGS=""
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Extrair dados ANP (replay de sessão APEX)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          AMBIENTE="${{ github.event.inputs.ambiente || 'todos' }}"
          ARGS="${{ steps.periodo.outputs.args }}"

          mkdir -p output/anp

          python scripts/pipelines/anp/cdp/01_extract_replay_only.py \
            $ARGS \
            --ambiente "$AMBIENTE" \
            --output output/anp

      - name: Upload to Supabase
        run: python scripts/pipelines/anp/cdp/02_upload.py --from-csv-dir output/anp/
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload CSVs como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: anp-producao-poco
          path: output/anp/*.csv
          retention-days: 90

      - name: Upload debug info em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: anp-debug-info
          path: output/anp/_downloads/
          retention-days: 14
