name: Extração ANP - Produção por Poço

on:
  schedule:
    - cron: '0 8 5 * *'  # dia 5 de cada mês, 08:00 UTC (05:00 BRT)
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período único MM/YYYY (ex: 01/2025)'
        required: false
      periodo_de:
        description: 'Período inicial MM/YYYY para lote'
        required: false
      periodo_ate:
        description: 'Período final MM/YYYY para lote'
        required: false
      ambiente:
        description: 'Ambiente: M (Mar), S (Pre-Sal), T (Terra), todos'
        required: false
        default: 'todos'

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Chrome + Chromedriver (versão coerente)
        uses: browser-actions/setup-chrome@latest
        id: setup-chrome

      - name: Remover chromedriver do sistema (evita conflito com Selenium Manager)
        run: |
          # Remove qualquer chromedriver instalado via apt (chromium-driver ou similar)
          # para garantir que o Selenium Manager use o driver baixado pelo setup-chrome.
          sudo rm -f /usr/bin/chromedriver /usr/local/bin/chromedriver || true
          echo "Chrome: $(google-chrome --version 2>/dev/null || ${{ steps.setup-chrome.outputs.chrome-path }} --version)"
          echo "Chromedriver path: $(which chromedriver 2>/dev/null || echo 'not in PATH — Selenium Manager resolverá')"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Calcular período automático
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            ARGS="--periodo ${{ github.event.inputs.periodo }}"
            PRIMEIRO="${{ github.event.inputs.periodo }}"
          elif [ -n "${{ github.event.inputs.periodo_de }}" ]; then
            DE="${{ github.event.inputs.periodo_de }}"
            ATE="${{ github.event.inputs.periodo_ate || github.event.inputs.periodo_de }}"
            ARGS="--de $DE --ate $ATE"
            PRIMEIRO="$DE"
          else
            # Agendado: 2 meses atrás
            PRIMEIRO=$(date -d "2 months ago" +"%m/%Y")
            ARGS="--periodo $PRIMEIRO"
          fi
          echo "args=$ARGS"         >> "$GITHUB_OUTPUT"
          echo "primeiro=$PRIMEIRO" >> "$GITHUB_OUTPUT"

      - name: Extrair dados ANP
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          AMBIENTE="${{ github.event.inputs.ambiente || 'todos' }}"
          ARGS="${{ steps.periodo.outputs.args }}"
          PRIMEIRO="${{ steps.periodo.outputs.primeiro }}"
          SESSION="output/anp/session.json"

          mkdir -p output/anp

          # Se existe session.json salvo, tenta replay direto (sem CAPTCHA).
          # Se o replay falhar (sessão expirou), recaptura e tenta de novo.
          # --capture agora também faz upsert da sessão em alertas_session (Supabase)
          # para que o monitor de alertas possa consumir a sessão sem Selenium.
          if [ -f "$SESSION" ]; then
            echo "=== Sessão existente encontrada — tentando replay sem CAPTCHA ==="
            if python scripts/pipelines/anp/cdp/01_extract.py --replay-only $ARGS \
                --ambiente "$AMBIENTE" --output output/anp; then
              echo "=== Replay concluído com sucesso ==="
            else
              echo "=== Replay falhou — sessão expirou, recapturando... ==="
              python scripts/pipelines/anp/cdp/01_extract.py --capture \
                --periodo "$PRIMEIRO" --ambiente M --output output/anp
              python scripts/pipelines/anp/cdp/01_extract.py --replay $ARGS \
                --ambiente "$AMBIENTE" --output output/anp
            fi
          else
            echo "=== Sem session.json — capturando sessão e extraindo ==="
            python scripts/pipelines/anp/cdp/01_extract.py --capture \
              --periodo "$PRIMEIRO" --ambiente M --output output/anp
            python scripts/pipelines/anp/cdp/01_extract.py --replay $ARGS \
              --ambiente "$AMBIENTE" --output output/anp
          fi

      - name: Upload to Supabase
        run: python scripts/pipelines/anp/cdp/02_upload.py --from-csv-dir output/anp/
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload CSVs e sessão
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: anp-producao-poco
          path: |
            output/anp/*.csv
            output/anp/session.json
          retention-days: 90

      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: anp-debug-screenshots
          path: output/anp/_debug/
          retention-days: 14
