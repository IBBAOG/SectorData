name: Extração ANP - Produção por Poço

on:
  schedule:
    - cron: '0 8 5 * *'  # 5th of each month, 08:00 UTC (05:00 BRT)
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Single period MM/YYYY (e.g. 04/2026)'
        required: false
      force_upload:
        description: 'Pass --no-incremental to 02_upload.py (re-upserts all CSVs regardless of DB max date)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      purge:
        description: 'Pass --purge to 02_upload.py — delete existing rows for target month before upserting'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Extraction uses the ANP Power BI public API (no CAPTCHA, no Selenium).
# Script: 01_extract_powerbi.py
#   - Queries Power BI well-level (poco) data for the target month
#   - Aggregates daily rows → monthly averages per (poco, campo, bacia)
#   - Derives local (PosSal / PreSal / Terra) from DB lookup + basin heuristic
#   - Writes 3 CSVs (one per local bucket) consumed by 02_upload.py
#
# Advantages over Selenium/CAPTCHA:
#   - No browser dependencies, no CAPTCHA retry loop
#   - Returns all wells (Power BI coverage: ~937 offshore wells in 04/2026
#     vs ~197 from APEX portal which had an undocumented row cap)

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compute target period
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            echo "primeiro=${{ github.event.inputs.periodo }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled: previous month (operators submit data during month N+1)
            PRIMEIRO=$(python -c "from datetime import date, timedelta; d=date.today().replace(day=1)-timedelta(days=1); print(f'{d.month:02d}/{d.year}')")
            echo "primeiro=$PRIMEIRO" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract via Power BI (all ambientes)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          PERIODO="${{ steps.periodo.outputs.primeiro }}"
          echo "=== Extracting $PERIODO via Power BI ==="
          mkdir -p output/anp
          python scripts/pipelines/anp/cdp/01_extract_powerbi.py \
            --periodo "$PERIODO" \
            --output output/anp

      - name: Upload to Supabase
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.force_upload }}" = "true" ]; then
            EXTRA_FLAGS="--no-incremental"
            echo "force_upload=true — passing --no-incremental to bypass per-local date check"
          fi
          if [ "${{ github.event.inputs.purge }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --purge"
            echo "purge=true — passing --purge to delete existing rows for target month before upserting"
          fi
          python scripts/pipelines/anp/cdp/02_upload.py --from-csv-dir output/anp/ $EXTRA_FLAGS
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload CSVs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: anp-producao-poco
          path: output/anp/*.csv
          retention-days: 90
