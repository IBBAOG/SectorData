# ============================================================
# DATA SOURCE: ANP CDP portal (Selenium + APEX + ddddocr CAPTCHA)
#   URL: https://cdp.anp.gov.br/ords/r/cdp_apex/consulta-dados-publicos-cdp
#
# DO NOT migrate this pipeline to Power BI. The Power BI source feeds the
# SEPARATE dashboard /anp-cdp-diaria (table anp_cdp_diaria*), which is a
# distinct product. Mixing sources contaminates anp_cdp_producao with
# divergent well-name formats and conflicting basin classification.
#
# If you genuinely need to change source, you must:
#   1. Update docs/app/anp-cdp.md "Data source" section
#   2. Remove the format guard in 02_upload.py
#   3. Get CTO sign-off explicitly
# ============================================================
name: Extração ANP - Produção por Poço

# Prevent concurrent runs. cron-job.org dispatches every ~2h; a slow Selenium run
# (CAPTCHA retry, network latency) can otherwise overlap the next dispatch and
# race against the BEFORE INSERT trigger, causing unique_violation that leaves
# the month partially loaded. cancel-in-progress=false because we never want to
# kill a long-running upload mid-flight — let it finish and queue the next run.
concurrency:
  group: anp-cdp
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 8 5 * *'  # 5th of each month, 08:00 UTC (05:00 BRT)
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Single period MM/YYYY (e.g. 04/2026)'
        required: false
      force_upload:
        description: 'Pass --no-incremental to 02_upload.py (re-upserts all CSVs regardless of DB max date)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      purge:
        description: 'Pass --purge to 02_upload.py — delete existing rows for target month before upserting'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      capture_session:
        description: 'Pass --capture to 01_extract.py (refreshes alertas_session for alertas/ monitor)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Extraction uses the ANP CDP APEX portal via Selenium + ddddocr CAPTCHA.
# Script: 01_extract.py
#   - Resolves CAPTCHA and navigates the APEX IR report
#   - Downloads the official monthly production CSV per ambiente (M/S/T)
#   - Writes 3 CSVs (one per local bucket) consumed by 02_upload.py
#
# Note: anp_cdp_powerbi.py and etl_anp_cdp_diaria.yml use the Power BI source
# for the SEPARATE /anp-cdp-diaria dashboard. That is a different product.
# Do not merge these pipelines.

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome (for Selenium)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          install-chromedriver: true

      - name: Compute target period
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            echo "primeiro=${{ github.event.inputs.periodo }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled: previous month (operators submit data during month N+1)
            PRIMEIRO=$(python -c "from datetime import date, timedelta; d=date.today().replace(day=1)-timedelta(days=1); print(f'{d.month:02d}/{d.year}')")
            echo "primeiro=$PRIMEIRO" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract via Selenium + CAPTCHA (all ambientes)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHROME_BINARY:        ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH:    ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          PERIODO="${{ steps.periodo.outputs.primeiro }}"
          echo "=== Extracting $PERIODO via Selenium/APEX CAPTCHA ==="
          mkdir -p output/anp
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.capture_session }}" = "true" ]; then
            EXTRA_FLAGS="--capture"
            echo "capture_session=true — passing --capture to refresh alertas_session APEX cookies"
          fi
          python scripts/pipelines/anp/cdp/01_extract.py \
            --periodo "$PERIODO" \
            --output output/anp \
            $EXTRA_FLAGS

      - name: Upload to Supabase
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.force_upload }}" = "true" ]; then
            EXTRA_FLAGS="--no-incremental --purge"
            echo "force_upload=true — passing --no-incremental and --purge (purge implied by force_upload to prevent PK overlap)"
          elif [ "${{ github.event.inputs.purge }}" = "true" ]; then
            EXTRA_FLAGS="--purge"
            echo "purge=true — passing --purge to delete existing rows for target month before upserting"
          fi
          python scripts/pipelines/anp/cdp/02_upload.py --from-csv-dir output/anp/ $EXTRA_FLAGS
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (anp_cdp_producao)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source anp_cdp_producao
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}

      - name: Upload CSVs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: anp-producao-poco
          path: output/anp/*.csv
          retention-days: 90
