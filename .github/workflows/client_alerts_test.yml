name: Client Alerts — Test (simulate update)

# On-demand test harness: SIMULATE a base update so its alert email fires NOW.
# Production-safe — the engine never writes the base's data table and never
# touches the watermark (alert_source_state). The only artifacts are a
# `test:`-prefixed alert_events row + its outbox/email_log rows (purgeable).
#
# Inputs:
#   source (required) — the source_slug to test (e.g. price_bands, d_g_margins, vendas).
#   to     (optional) — also send one extra copy of the rendered email here.

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source slug to test (e.g. price_bands, d_g_margins, vendas)'
        required: true
        type: string
      to:
        description: 'Optional: also send an extra copy to this email address'
        required: false
        type: string

# Own group so concurrent test runs queue rather than clobber each other.
concurrency:
  group: client-alerts-test
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Simulate update and send test alert
        run: >-
          python -m scripts.client_alerts.run_base
          --test
          --source "${{ inputs.source }}"
          ${{ inputs.to && format('--to {0}', inputs.to) || '' }}
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL: ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL: ${{ vars.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
