name: ANP Fase 3 — Sync (DAIE + Desembaraços)

on:
  schedule:
    - cron: '0 13 1 * *'   # 1st of each month at 13:00 UTC (10:00 BRT)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ANP Dados Abertos IE → Supabase
        run: python scripts/pipelines/anp/fase3/01_daie_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Sync ANP Desembaraços → Supabase
        run: python scripts/pipelines/anp/fase3/02_desembaracos_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (anp_daie + anp_desembaracos)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source anp_daie --source anp_desembaracos
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}
