name: Monitoramento Navios Diesel

on:
  schedule:
    - cron: '0 10,16,22,4 * * *'  # a cada 6h a partir das 7h BRT (10,16,22,04 UTC)
  workflow_dispatch:           # permite rodar manualmente pelo GitHub

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitoramento
        run: python navios_esperados.py

      - name: Commitar resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add output/
          git diff --cached --quiet || git commit -m "dados: atualização $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: '20'

      - name: Importar dados para Supabase
        if: always()
        run: |
          npm install @supabase/supabase-js
          node scripts/import_navios_diesel.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
