name: Monitoramento Navios Diesel

on:
  # Agendamento gerenciado externamente via cron-job.org → workflow_dispatch
  # O trigger schedule nativo do GitHub não garante pontualidade em intervalos curtos.
  # Cadência desejada: a cada 6h (10, 16, 22, 04 UTC = 07, 13, 19, 01 BRT).
  workflow_dispatch:           # permite rodar manualmente pelo GitHub e via cron-job.org

jobs:
  monitorar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitoramento
        run: python navios_esperados.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Importar dados para Supabase
        run: |
          npm install @supabase/supabase-js
          node scripts/import_navios_diesel.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
