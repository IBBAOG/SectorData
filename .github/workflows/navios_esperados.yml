name: Monitoramento Navios Diesel

on:
  schedule:
    - cron: '0 */6 * * *'    # a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:           # permite rodar manualmente pelo GitHub

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitoramento
        run: python navios_esperados.py

      - name: Commitar resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "dados: atualização $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
