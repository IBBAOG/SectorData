name: Alerts Meta Canary (stale-base detection)

on:
  schedule:
    - cron: '0 12 * * *'    # daily at 12:00 UTC
  workflow_dispatch:

jobs:
  canary:
    name: Check stale alert sources
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check stale bases (>48h without new event)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.alerts.cli canary --stale-hours 48
        # Non-zero exit if any source is stale — GHA will mark run as failed
        # and CTO/admin will be notified via GHA email on failure
