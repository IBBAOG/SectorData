name: Alerts Monitor (detection + fanout + delivery)

on:
  workflow_dispatch:         # triggered by cron-job.org every ~2h
  schedule:
    - cron: '0 */2 * * *'   # every 2h fallback

jobs:
  monitor:
    name: Detect → Fanout → Deliver
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect updates (all sources)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.alerts.cli detect --all

      - name: Fanout to outbox
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.alerts.cli fanout

      - name: Send via Resend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERTS_FRONTEND_URL: ${{ secrets.ALERTS_FRONTEND_URL || 'https://sectordata-dashboard.vercel.app' }}
        run: python -m scripts.alerts.cli deliver --batch-limit 100
