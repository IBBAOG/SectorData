name: ANP Watcher - Vendas Combustíveis

# Serialize runs. The external cron-job.org dispatcher fires every 30 min; the
# internal schedule below adds one run every 2h. Without a group, a revived
# external cadence could overlap the internal cron and race the watcher's
# DELETE-month + INSERT-month upload (duplicated rows). cancel-in-progress=false:
# never kill an upload mid-flight — let it finish and queue the next run.
concurrency:
  group: anp-vendas
  cancel-in-progress: false

on:
  # DUAL TRIGGER (same design as etl_anp_cdp.yml):
  #   1. External: cron-job.org → workflow_dispatch every 30 min (primary; GitHub's
  #      native schedule does not guarantee punctuality at short intervals).
  #   2. Internal: schedule every 2h as a FALLBACK so the pipeline survives the
  #      death of the external dispatcher. Added 2026-06-10 after the cron-job.org
  #      vendas job went permanently silent on 2026-06-01 (9+ days, zero runs,
  #      invisible to the failure pager — there were no FAILED runs to count).
  schedule:
    - cron: '17 */2 * * *'   # every 2h at :17 (offset minute to dodge GHA peak load)
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar verificação mesmo fora do período (--force)'
        required: false
        default: 'true'
        type: boolean

jobs:
  verificar-e-subir:
    name: Verificar ANP e subir dados
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install requests pandas supabase python-dotenv schedule jinja2

      - name: Verificar variáveis de ambiente
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Secret SUPABASE_URL não configurado"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Secret SUPABASE_SERVICE_ROLE_KEY não configurado"
            exit 1
          fi
          echo "Secrets OK."

      - name: Rodar ANP Watcher
        run: python scripts/pipelines/anp/vendas_watch.py --force
        # --force: skip the day-of-month/state-file gates, run once and exit.
        # The script is idempotent under frequent re-runs:
        #   * strictly NEWER source period  -> upload that month only;
        #   * SAME period with MORE source rows than the DB -> in-place refresh of
        #     that month (delete+insert, partial -> complete; never shrinks);
        #   * same period, same/fewer rows -> no-op.
        # The 30-min external dispatch + 2h internal cron are both safe cadences.

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (vendas)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source vendas
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}
