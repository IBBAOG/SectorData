name: ANP Watcher - Vendas Combustíveis

# Serialize runs. GHA cron jitter at a 30-min cadence can stack runs (a delayed
# fire landing next to the on-time one), and any manual/external workflow_dispatch
# can land mid-run. Without a group, overlapping runs would race the watcher's
# DELETE-month + INSERT-month upload (duplicated rows). cancel-in-progress=false:
# never kill an upload mid-flight — let it finish and queue the next run.
concurrency:
  group: anp-vendas
  cancel-in-progress: false

on:
  # PRIMARY trigger: internal GHA cron every 30 min (cadence internalized
  # 2026-06-10 — the historical cron-job.org dispatcher died permanently on
  # 2026-06-01 and cannot be re-armed; see docs/etl-pipelines/PRD.md § "ANP
  # Vendas — dispatcher death & frozen partial month").
  # Sanity note: GHA cron is best-effort — minutes of jitter and occasional
  # skipped fires are normal. Acceptable here: the watcher is an idempotent
  # no-op ~95% of the time, the data is monthly, and the 26h dispatcher-silence
  # detector in workflow_failure_monitor.py backstops a fully dead schedule.
  # workflow_dispatch stays available for manual runs / any future external trigger.
  schedule:
    - cron: '7,37 * * * *'   # every 30 min at :07/:37 (offset from :00/:30 to dodge GHA top-of-hour congestion)
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar verificação mesmo fora do período (--force)'
        required: false
        default: 'true'
        type: boolean

jobs:
  verificar-e-subir:
    name: Verificar ANP e subir dados
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install requests pandas supabase python-dotenv schedule jinja2

      - name: Verificar variáveis de ambiente
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Secret SUPABASE_URL não configurado"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Secret SUPABASE_SERVICE_ROLE_KEY não configurado"
            exit 1
          fi
          echo "Secrets OK."

      - name: Rodar ANP Watcher
        run: python scripts/pipelines/anp/vendas_watch.py --force
        # --force: skip the day-of-month/state-file gates, run once and exit.
        # The script is idempotent under frequent re-runs:
        #   * strictly NEWER source period  -> upload that month only;
        #   * SAME period with MORE source rows than the DB -> in-place refresh of
        #     that month (delete+insert, partial -> complete; never shrinks);
        #   * same period, same/fewer rows -> no-op.
        # The internal 30-min cron (and any manual dispatch) are safe cadences.

      # Client Alerts hook — emit + (immediate) deliver for the bases this ETL updates.
      - name: Client Alerts — notify subscribers (vendas)
        continue-on-error: true   # non-critical side-effect — never fail the data pipeline
        if: success()
        run: python -m scripts.client_alerts.run_base --source vendas
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_ADDRESS:      ${{ vars.GMAIL_ADDRESS || 'ibbaogproject@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERTS_SENDER_EMAIL:       ${{ vars.ALERTS_SENDER_EMAIL || 'SectorData Alerts <ibbaogproject@gmail.com>' }}
          ALERTS_FRONTEND_URL:       ${{ vars.ALERTS_FRONTEND_URL || 'https://oilandgasdata.vercel.app' }}
